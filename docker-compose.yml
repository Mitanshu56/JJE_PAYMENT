version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: payment_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DB: payment_tracking
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - payment_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payment_backend
    environment:
      MONGODB_URL: mongodb://admin:password123@mongodb:27017
      MONGODB_DB_NAME: payment_tracking
      DEBUG: "False"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - payment_network
    volumes:
      - ./backend:/app  # For development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: payment_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - payment_network
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  mongodb_data:

networks:
  payment_network:
    driver: bridge
